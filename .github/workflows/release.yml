name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      - name: Upload JS asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/hacs-compatibility-auditor-card.js
          asset_name: hacs-compatibility-auditor-card.js
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload gzip asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/hacs-compatibility-auditor-card.js.gz
          asset_name: hacs-compatibility-auditor-card.js.gz
          tag: ${{ github.ref }}
          overwrite: true
